<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STBC · Distribución de Agentes · 8/4/2026</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #f0f2f5;
      --surface:   #ffffff;
      --surface2:  #f7f8fa;
      --surface3:  #eef0f4;
      --border:    #e2e5eb;
      --text:      #0f1923;
      --text2:     #4a5568;
      --text3:     #8898aa;
      --accent:    #2563eb;
      --accent2:   #7c3aed;
      --shadow:    0 2px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
      --radius:    12px;
      --radius-sm: 8px;
      --c-activo:        #16a34a;
      --c-activo-bg:     #dcfce7;
      --c-activo-border: #86efac;
      --c-vacante:       #d97706;
      --c-vacante-bg:    #fef3c7;
      --c-vacante-border:#fcd34d;
    }

    [data-theme="dark"] {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1c2128;
      --surface3:  #21262d;
      --border:    #30363d;
      --text:      #e6edf3;
      --text2:     #8b949e;
      --text3:     #484f58;
      --accent:    #58a6ff;
      --accent2:   #bc8cff;
      --shadow:    0 2px 12px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
      --c-activo:        #4ade80;
      --c-activo-bg:     #052e16;
      --c-activo-border: #166534;
      --c-vacante:       #fbbf24;
      --c-vacante-bg:    #3d2600;
      --c-vacante-border:#92400e;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.25s, color 0.25s;
    }

    /* ── TOP BAR ─────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 10px 14px 8px;
    }
    .topbar-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* fila 1: marca + nav links + botón tema */
    .topbar-row1 {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topbar-title {
      flex: 0 0 auto;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .stbc-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
    }

    /* nav links en fila 1, con scroll horizontal si hace falta */
    .topbar-nav {
      display: flex;
      gap: 4px;
      align-items: center;
      overflow-x: auto;
      scrollbar-width: none;
      flex: 1;
    }
    .topbar-nav::-webkit-scrollbar { display: none; }
    .topbar-nav-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .topbar-nav-link:hover { background: var(--surface3); color: var(--text); }
    .topbar-nav-link.nav-here {
      background: var(--accent2);
      border-color: var(--accent2);
      color: #fff;
    }

    /* botón tema al final de fila 1, nunca se corta */
    .btn-icon {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      transition: background 0.2s, color 0.2s;
    }
    .btn-icon:hover { background: var(--surface3); color: var(--text); }

    /* fila 2: buscador + botón mostrar todo — siempre a ancho completo */
    .topbar-row2 {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .search-wrap {
      flex: 1;
      position: relative;
      min-width: 0;
    }
    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      pointer-events: none;
      font-size: 0.85rem;
    }
    #search-input {
      width: 100%;
      padding: 7px 12px 7px 30px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    #search-input::placeholder { color: var(--text3); }

    .btn-expand {
      flex-shrink: 0;
      padding: 6px 11px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      white-space: nowrap;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .btn-expand:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-expand.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── STATS ───────────────────────────────── */
    .stats-row {
      max-width: 900px;
      margin: 20px auto 0;
      padding: 0 16px;
      display: flex;
      gap: 10px;
    }
    .stat-pill {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .stat-num {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      line-height: 1;
    }
    .stat-lbl {
      font-size: 0.72rem;
      color: var(--text3);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── SEARCH RESULT NOTICE ────────────────── */
    .search-notice {
      max-width: 900px;
      margin: 12px auto 0;
      padding: 0 16px;
      font-size: 0.82rem;
      color: var(--text3);
      display: none;
    }
    .search-notice.visible { display: block; }
    .search-notice strong { color: var(--accent); }

    /* ── SUPERVISOR LIST ─────────────────────── */
    .sup-list {
      max-width: 900px;
      margin: 16px auto 0;
      padding: 0 16px 40px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sup-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .sup-card.hidden { display: none; }

    /* supervisor row — always visible, clickable */
    .sup-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .sup-row:hover { background: var(--surface2); }

    .sup-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 0.85rem;
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }

    .sup-info { flex: 1; min-width: 0; }
    .sup-name {
      font-size: 0.97rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sup-meta {
      font-size: 0.73rem;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 1px;
    }

    .sup-counter {
      font-size: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text3);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      white-space: nowrap;
    }

    .sup-chevron {
      color: var(--text3);
      font-size: 0.8rem;
      transition: transform 0.25s;
      flex-shrink: 0;
    }
    .sup-card.open .sup-chevron { transform: rotate(180deg); }

    /* agent list inside card */
    .agentes-panel {
      display: none;
      border-top: 1px solid var(--border);
    }
    .sup-card.open .agentes-panel { display: block; }

    .agente-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .agente-row:last-child { border-bottom: none; }
    .agente-row:hover { background: var(--surface2); }
    .agente-row.vacancy { background: var(--c-vacante-bg); }
    .agente-row.hidden-by-search { display: none; }

    .agente-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--surface3);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }
    .agente-row.vacancy .agente-num {
      background: var(--c-vacante-bg);
      border-color: var(--c-vacante-border);
      color: var(--c-vacante);
    }

    .agente-name-txt {
      flex: 1;
      font-size: 0.9rem;
      color: var(--text);
    }
    .agente-name-txt.vacancy-txt {
      color: var(--c-vacante);
      font-style: italic;
    }

    .badge {
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      border: 1px solid transparent;
    }
    .badge-activo {
      background: var(--c-activo-bg);
      color: var(--c-activo);
      border-color: var(--c-activo-border);
    }
    .badge-vacante {
      background: var(--c-vacante-bg);
      color: var(--c-vacante);
      border-color: var(--c-vacante-border);
    }

    /* ── SEARCH: highlight ───────────────────── */
    mark {
      background: rgba(37,99,235,0.18);
      color: var(--accent);
      border-radius: 2px;
      padding: 0 1px;
    }

    /* ── NO RESULTS ──────────────────────────── */
    .no-results {
      display: none;
      text-align: center;
      padding: 40px 20px;
      color: var(--text3);
      font-size: 0.9rem;
    }
    .no-results.visible { display: block; }

    /* ── FOOTER / BRANDING ───────────────────── */
    .brand-strip {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 16px 32px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
      margin-top: 8px;
    }
    .brand-icon { font-size: 1.1rem; flex-shrink: 0; }
    .brand-text {
      font-size: 0.72rem;
      color: var(--text3);
      line-height: 1.5;
    }
    .brand-text strong {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--text3);
      font-weight: 600;
    }

    /* ── RESPONSIVE ──────────────────────────── */
    @media (min-width: 640px) {
      .topbar { padding: 10px 20px 8px; }
    }

    @media print {
      body { background: #fff; }
      .topbar { position: static; box-shadow: none; border-bottom: 1px solid #ccc; }
      .btn-icon, .btn-expand, .search-wrap { display: none; }
      .sup-card { box-shadow: none; }
      .agentes-panel { display: block !important; }
      .sup-chevron { display: none; }
    }
  </style>
</head>
<body>

    <div class="topbar-row1">

      <div class="topbar-nav">

<script src="config.js"></script>
<script>
  /* ═══════════════════════════════════════════════════
     DISTRIBUCIÓN DINÁMICA DE AGENTES
     ═══════════════════════════════════════════════════ */
  function nombreAmigable(agente) {
    if (agente.name) return agente.name;
    const p = agente.nombre.split(' ');
    if (p.length >= 3) return p[2][0].toUpperCase() + p[2].slice(1).toLowerCase() + ' ' + p[0][0].toUpperCase() + p[0].slice(1).toLowerCase();
    if (p.length === 2) return p[0][0].toUpperCase() + p[0].slice(1).toLowerCase() + ' ' + p[1][0].toUpperCase() + p[1].slice(1).toLowerCase();
    return agente.nombre;
  }

  function iniciales(agente) {
    const name = agente.name || agente.nombre;
    const p = name.split(' ');
    return (p[0][0] + (p[1] || p[0])[0]).toUpperCase();
  }

  function distribuirAgentes() {
    const agentes = (window.__CONFIG && window.__CONFIG.agentes) || [];
    const sups = agentes.filter(a => a.tipo === 'supervisor');
    let traffic = agentes.filter(a => a.tipo === 'traffic');

    // Inicializar equipos
    const equipos = {};
    sups.forEach(s => equipos[s.id] = { sup: s, agentes: [] });

    // 1. Rodrigo (2000676) forzosamente a David (2000566)
    const rodrigoIdx = traffic.findIndex(a => a.id === '2000676');
    const davidSup = sups.find(s => s.id === '2000566');
    if (rodrigoIdx !== -1 && davidSup) {
      equipos[davidSup.id].agentes.push(traffic[rodrigoIdx]);
      traffic.splice(rodrigoIdx, 1);
    }

    // 2. Función de restricción
    function puedeAsignar(agente, sup) {
      if (agente.id === '2000467' && sup.id === '2000566') return false; // Elizabeth no David
      const apellido = agente.nombre.split(' ')[0];
      if (apellido === 'MORENO' && (sup.id === '2000566' || sup.id === '2000191')) return false; // Moreno no David ni Aldo
      return true;
    }

    // 3. Separar por restricción
    const restringidos = [];
    const normales = [];
    traffic.forEach(a => {
      const opciones = sups.filter(s => puedeAsignar(a, s)).length;
      if (opciones < sups.length) restringidos.push(a); else normales.push(a);
    });

    // 4. Ordenar restringidos (menos opciones primero)
    restringidos.sort((a, b) => {
      const optA = sups.filter(s => puedeAsignar(a, s)).length;
      const optB = sups.filter(s => puedeAsignar(b, s)).length;
      return optA - optB;
    });

    // 5. Asignar restringidos
    restringidos.forEach(agente => {
      const candidatos = sups
        .filter(s => puedeAsignar(agente, s))
        .sort((a, b) => equipos[a.id].agentes.length - equipos[b.id].agentes.length);
      equipos[candidatos[0].id].agentes.push(agente);
    });

    // 6. Asignar normales equitativamente
    normales.forEach(agente => {
      const candidatos = sups
        .filter(s => puedeAsignar(agente, s))
        .sort((a, b) => equipos[a.id].agentes.length - equipos[b.id].agentes.length);
      equipos[candidatos[0].id].agentes.push(agente);
    });

    return { sups, equipos };
  }

  function renderDistribution() {
    const { sups, equipos } = distribuirAgentes();
    const list = document.getElementById('sup-list');
    let totalAgentes = 0;

    list.innerHTML = '';
    sups.forEach(sup => {
      const team = equipos[sup.id].agentes;
      totalAgentes += team.length;
      const nombreSup = nombreAmigable(sup);
      const avatar = iniciales(sup);

      let agentesHtml = '';
      team.forEach((a, i) => {
        agentesHtml += `
          <div class="agente-row" data-name="${nombreAmigable(a)}">
            <div class="agente-num">${i + 1}</div>
            <span class="agente-name-txt">${nombreAmigable(a)}</span>
            <span class="badge badge-activo">Activo</span>
          </div>`;
      });

      list.innerHTML += `
        <div class="sup-card" data-sup="${nombreSup}">
          <div class="sup-row" onclick="toggleCard(this)">
            <div class="sup-avatar">${avatar}</div>
            <div class="sup-info">
              <div class="sup-name">${nombreSup}</div>
              <div class="sup-meta">Supervisor de Tráfico</div>
            </div>
            <div class="sup-counter">${team.length} agentes</div>
            <div class="sup-chevron">▼</div>
          </div>
          <div class="agentes-panel">
            ${agentesHtml}
          </div>
        </div>`;
    });

    // Stats
    document.getElementById('stats-row').innerHTML = `
      <div class="stat-pill"><div class="stat-num">${sups.length}</div><div class="stat-lbl">Supervisores</div></div>
      <div class="stat-pill"><div class="stat-num">${totalAgentes}</div><div class="stat-lbl">Agentes</div></div>`;
  }

  /* ── THEME ───────────────────────────────── */
  const html = document.documentElement;
  const btnTheme = document.getElementById('btn-theme');

  function applyTheme(t) {
    html.setAttribute('data-theme', t);
    btnTheme.textContent = t === 'dark' ? '☀️' : '🌙';
    try { localStorage.setItem('stbc-theme', t); } catch(e){}
  }

  (function initTheme() {
    let saved;
    try { saved = localStorage.getItem('stbc-theme'); } catch(e){}
    applyTheme(saved || 'light');
  })();

  /* Renderizar distribución al cargar */
  renderDistribution();

  btnTheme.addEventListener('click', () => {
    applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });

  /* ── EXPAND / COLLAPSE ───────────────────── */
  function toggleCard(row) {
    const card = row.closest('.sup-card');
    card.classList.toggle('open');
    syncExpandBtn();
  }

  const btnExpand = document.getElementById('btn-expand-all');
  let allExpanded = false;

  function syncExpandBtn() {
    const cards = document.querySelectorAll('.sup-card:not(.hidden)');
    const openCount = [...cards].filter(c => c.classList.contains('open')).length;
    allExpanded = openCount === cards.length && cards.length > 0;
    btnExpand.textContent = allExpanded ? 'Colapsar todo' : 'Mostrar todo';
    btnExpand.classList.toggle('active', allExpanded);
  }

  btnExpand.addEventListener('click', () => {
    const cards = document.querySelectorAll('.sup-card:not(.hidden)');
    const shouldOpen = !allExpanded;
    cards.forEach(c => c.classList.toggle('open', shouldOpen));
    syncExpandBtn();
  });

  /* ── SEARCH ──────────────────────────────── */
  const searchInput = document.getElementById('search-input');
  const notice      = document.getElementById('search-notice');
  const noResults   = document.getElementById('no-results');

  function normalize(s) {
    return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  }

  function highlight(text, q) {
    if (!q) return text;
    const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    return text.replace(re, '<mark>$1</mark>');
  }

  searchInput.addEventListener('input', () => {
    const raw = searchInput.value.trim();
    const q   = normalize(raw);

    const cards = document.querySelectorAll('.sup-card');
    let totalVisible = 0;

    cards.forEach(card => {
      const supName = card.getAttribute('data-sup') || '';
      const supMatch = q && normalize(supName).includes(q);
      const rows = card.querySelectorAll('.agente-row');
      let cardHasMatch = false;

      rows.forEach(row => {
        const name = row.getAttribute('data-name') || '';
        const match = !q || normalize(name).includes(q) || supMatch;
        row.classList.toggle('hidden-by-search', !match);
        if (match) cardHasMatch = true;

        // highlight
        const span = row.querySelector('.agente-name-txt');
        if (span) span.innerHTML = highlight(name, raw);
      });

      // supervisor name highlight
      const supNameEl = card.querySelector('.sup-name');
      if (supNameEl) supNameEl.innerHTML = highlight(supName, raw);

      const visible = !q || cardHasMatch || supMatch;
      card.classList.toggle('hidden', !visible);
      if (visible) totalVisible++;

      // auto-open when searching
      if (q && (cardHasMatch || supMatch)) {
        card.classList.add('open');
      } else if (!q) {
        // restore closed state on clear? keep user's state
      }
    });

    noResults.classList.toggle('visible', totalVisible === 0);

    if (q) {
      notice.classList.add('visible');
      notice.innerHTML = `Mostrando resultados para <strong>"${raw}"</strong>`;
    } else {
      notice.classList.remove('visible');
    }

    syncExpandBtn();
  });
</script>
</body>
</html>
