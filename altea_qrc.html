<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STBC — Altéa Referencia Rápida</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ── THEME VARIABLES ── */
:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface2: #f7f8fa;
  --surface3: #eef0f4;
  --border: #e2e5eb;
  --border2: #d0d4dd;
  --text: #0f1923;
  --text2: #4a5568;
  --text3: #8898aa;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --accent2: #7c3aed;
  --cmd-color: #0369a1;
  --cmd-bg: #e0f2fe;
  --cmd-border: #7dd3fc;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
  --shadow-xl: 0 16px 48px rgba(0,0,0,0.13);
  --radius: 14px;
  --radius-sm: 9px;
  --nav-h: 52px;
  --header-h: 140px;
}
[data-theme="dark"] {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2128;
  --surface3: #21262d;
  --border: #30363d;
  --border2: #3d444d;
  --text: #e6edf3;
  --text2: #8b949e;
  --text3: #484f58;
  --accent: #58a6ff;
  --accent-hover: #79b8ff;
  --accent2: #bc8cff;
  --cmd-color: #38bdf8;
  --cmd-bg: rgba(56,189,248,0.10);
  --cmd-border: #0369a1;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
  --shadow-xl: 0 16px 48px rgba(0,0,0,0.6);
}

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  transition: background 0.25s, color 0.25s;
  overflow-x: hidden;
}

/* ── TOP NAV BAR ── */
.stbc-nav {
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow);
  height: var(--nav-h);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
}
.stbc-nav::-webkit-scrollbar { display: none; }

.stbc-nav-brand {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  text-decoration: none;
  white-space: nowrap;
  margin-right: 8px;
  flex-shrink: 0;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  transition: background 0.15s;
}
.stbc-nav-brand:hover { background: var(--surface3); }
.stbc-nav-brand span { font-size: 11px; }

.stbc-nav-link {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  text-decoration: none;
  white-space: nowrap;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  transition: all 0.15s;
  flex-shrink: 0;
}
.stbc-nav-link:hover { background: var(--surface3); color: var(--text); }
.stbc-nav-link.nav-active { background: var(--accent); color: #fff; }

.nav-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; margin: 0 4px; }

.theme-btn {
  margin-left: auto;
  flex-shrink: 0;
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
  white-space: nowrap;
}
.theme-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── APP HEADER ── */
.app-header {
  background: linear-gradient(135deg, #1e3a6e 0%, #0f2040 60%, #162032 100%);
  padding: 20px 16px 0;
  position: relative;
  overflow: hidden;
}
[data-theme="dark"] .app-header {
  background: linear-gradient(135deg, #0d1a2e 0%, #0a1525 60%, #0d1117 100%);
}
.app-header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 80% 20%, rgba(37,99,235,0.18) 0%, transparent 60%);
  pointer-events: none;
}

.header-branding {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}
.header-logo-pill {
  background: #fff;
  border-radius: 6px;
  padding: 3px 9px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  color: #001f5b;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}
.header-title {
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.2px;
}
.header-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.45);
  margin-bottom: 14px;
  margin-left: 2px;
}

/* ── SEARCH HERO ── */
.search-hero {
  position: relative;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.14);
  border-radius: 16px 16px 0 0;
  padding: 14px 14px 0;
  margin-top: 4px;
}
.search-label {
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.search-wrap {
  position: relative;
  display: flex;
  gap: 8px;
  align-items: center;
  padding-bottom: 14px;
}
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(255,255,255,0.35);
  font-size: 17px;
  pointer-events: none;
  transition: color 0.2s;
}
#searchInput {
  flex: 1;
  background: rgba(255,255,255,0.10);
  border: 1.5px solid rgba(255,255,255,0.18);
  border-radius: 12px;
  padding: 12px 42px 12px 44px;
  color: #fff;
  font-size: 16px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  caret-color: var(--accent);
  -webkit-appearance: none;
}
#searchInput::placeholder { color: rgba(255,255,255,0.3); }
#searchInput:focus {
  border-color: rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.14);
}
#searchInput:focus ~ .search-icon,
.search-wrap:focus-within .search-icon { color: rgba(255,255,255,0.6); }

.clear-search-btn {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.15);
  border: none;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
  line-height: 1;
}
.clear-search-btn.visible { display: flex; }
.clear-search-btn:hover { background: rgba(255,255,255,0.25); }

/* ── CATEGORY FILTER PILLS ── */
.cat-pills {
  display: flex;
  gap: 6px;
  padding: 10px 16px;
  overflow-x: auto;
  scrollbar-width: none;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.cat-pills::-webkit-scrollbar { display: none; }

.cat-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.18s;
  flex-shrink: 0;
}
.cat-pill:hover { border-color: var(--accent); color: var(--accent); }
.cat-pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.cat-pill .dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── MAIN CONTENT ── */
.main {
  max-width: 720px;
  margin: 0 auto;
  padding: 12px 12px 80px;
}

/* ── SEARCH RESULTS ── */
.results-area {
  display: none;
}
.results-area.active { display: block; }

.results-header {
  font-size: 12px;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  padding: 10px 4px 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.results-header strong { color: var(--accent); }

.result-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.18s, box-shadow 0.18s, transform 0.12s;
  position: relative;
  overflow: hidden;
}
.result-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--card-color, var(--accent));
  border-radius: 3px 0 0 3px;
}
.result-card:hover {
  border-color: var(--card-color, var(--accent));
  box-shadow: var(--shadow-lg);
  transform: translateY(-1px);
}
.result-card:active { transform: scale(0.99); }

.result-cat-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--card-color, var(--accent));
  background: color-mix(in srgb, var(--card-color, var(--accent)) 12%, transparent);
  padding: 2px 7px;
  border-radius: 20px;
  margin-bottom: 6px;
}
.result-es {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 8px;
}
.result-cmds {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.cmd-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--cmd-color);
  background: var(--cmd-bg);
  border: 1px solid var(--cmd-border);
  padding: 4px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
  -webkit-user-select: none;
  display: flex;
  align-items: center;
  gap: 5px;
}
.cmd-chip:hover {
  background: var(--cmd-color);
  color: #fff;
  border-color: var(--cmd-color);
}
.cmd-chip:active { transform: scale(0.96); }
.cmd-chip .copy-icon { font-size: 11px; opacity: 0.7; }

/* ── BROWSE MODE ── */
.browse-area {}

.section-block {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.18s;
}
.section-block:hover { border-color: var(--border2); }

.section-header-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  background: var(--surface);
  border: none;
  cursor: pointer;
  text-align: left;
  transition: background 0.15s;
}
.section-header-btn:hover { background: var(--surface2); }
.section-header-btn:active { background: var(--surface3); }

.section-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.section-name-es {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
  text-align: left;
}
.section-name-en {
  font-size: 11px;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  text-align: right;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 40%;
}
.section-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  background: var(--surface3);
  border-radius: 10px;
  padding: 2px 8px;
  flex-shrink: 0;
}
.section-chevron {
  color: var(--text3);
  font-size: 12px;
  transition: transform 0.25s;
  flex-shrink: 0;
}
.section-block.open .section-chevron { transform: rotate(180deg); }

.section-body {
  display: none;
  border-top: 1px solid var(--border);
}
.section-block.open .section-body { display: block; }

.entry-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
  cursor: pointer;
}
.entry-row:last-child { border-bottom: none; }
.entry-row:hover { background: var(--surface2); }
.entry-row:active { background: var(--surface3); }

.entry-text { flex: 1; min-width: 0; }
.entry-es-text {
  font-size: 13px;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 6px;
}
.entry-cmds-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.entry-cmd-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  color: var(--cmd-color);
  background: var(--cmd-bg);
  border: 1px solid var(--cmd-border);
  padding: 3px 8px;
  border-radius: 7px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.entry-cmd-chip:hover {
  background: var(--cmd-color);
  color: #fff;
  border-color: var(--cmd-color);
}
.entry-cmd-chip:active { transform: scale(0.96); }

/* ── DETAIL MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  align-items: flex-end;
  justify-content: center;
  padding: 0;
}
.modal-overlay.open { display: flex; }

@media (min-width: 600px) {
  .modal-overlay { align-items: center; padding: 20px; }
}

.modal-sheet {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-width: 600px;
  max-height: 92dvh;
  overflow-y: auto;
  animation: slideUp 0.28s cubic-bezier(0.22, 1, 0.36, 1);
  padding-bottom: env(safe-area-inset-bottom);
}

@media (min-width: 600px) {
  .modal-sheet {
    border-radius: 20px;
    max-height: 80dvh;
    box-shadow: var(--shadow-xl);
  }
}

@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-drag-handle {
  width: 36px;
  height: 4px;
  border-radius: 2px;
  background: var(--border2);
  margin: 10px auto 0;
}

@media (min-width: 600px) {
  .modal-drag-handle { display: none; }
}

.modal-header {
  padding: 14px 20px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.modal-cat-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 20px;
  margin-bottom: 6px;
}
.modal-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
}
.modal-close {
  background: var(--surface3);
  border: none;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  cursor: pointer;
  color: var(--text2);
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s;
}
.modal-close:hover { background: var(--border); }

.modal-body { padding: 16px 20px 20px; }

.modal-cmds-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
  font-family: 'JetBrains Mono', monospace;
}
.modal-cmds {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}
.modal-cmd-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  color: var(--cmd-color);
  background: var(--cmd-bg);
  border: 1.5px solid var(--cmd-border);
  padding: 10px 18px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.modal-cmd-chip:hover {
  background: var(--cmd-color);
  color: #fff;
  border-color: var(--cmd-color);
}
.modal-cmd-chip:active { transform: scale(0.97); }
.modal-cmd-chip .tap-hint {
  font-size: 10px;
  opacity: 0.55;
  font-weight: 400;
}

.modal-en {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin-bottom: 14px;
}
.modal-en-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 4px;
}
.modal-en-text {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.5;
  font-style: italic;
}

.modal-related-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 8px;
  font-family: 'JetBrains Mono', monospace;
  display: flex;
  align-items: center;
  gap: 6px;
}
.related-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.related-card:hover { border-color: var(--accent); background: var(--surface3); }
.related-card:active { transform: scale(0.99); }
.related-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.related-es { font-size: 12px; color: var(--text); flex: 1; }
.related-cmd { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; color: var(--cmd-color); }

/* ── COPY TOAST ── */
.copy-toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: #16a34a;
  color: #fff;
  padding: 9px 20px;
  border-radius: 24px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 1000;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(22,163,74,0.35);
  display: flex;
  align-items: center;
  gap: 6px;
}
.copy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── FOOTER ── */
.app-footer {
  text-align: center;
  padding: 16px 16px 32px;
  border-top: 1px solid var(--border);
  margin-top: 8px;
}
.footer-brand {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  opacity: 0.65;
}
.footer-brand .raccoon { font-size: 14px; opacity: 1; }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
}
.empty-state .icon { font-size: 40px; margin-bottom: 10px; display: block; }
.empty-state p { font-size: 13px; line-height: 1.6; }
.empty-state strong { color: var(--accent); }

/* ── HIDDEN ── */
.hidden { display: none !important; }

/* ── RESPONSIVE ── */
@media (min-width: 600px) {
  .main { padding: 16px 16px 80px; }
  .cat-pills { padding: 12px 16px; }
  .section-name-en { display: block; }
  .modal-cmd-chip { font-size: 20px; }
}

@media (min-width: 900px) {
  .main { padding: 20px 24px 80px; }
  .app-header { padding: 24px 24px 0; }
}
</style>
</head>
<body>

<!-- TOP NAV -->

// ── THEME ──
function initTheme() {
  const saved = localStorage.getItem('stbc-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  updateThemeBtn(saved);
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('stbc-theme', next);
  updateThemeBtn(next);
}
function updateThemeBtn(theme) {
  const btn = document.getElementById('themeBtn');
  btn.textContent = theme === 'dark' ? '☀️ Claro' : '🌙 Oscuro';
}

// ── BUILD SEARCH INDEX ──
const searchIndex = [];
SECTIONS.forEach((sec, si) => {
  sec.entries.forEach((entry, ei) => {
    searchIndex.push({
      es: entry.es,
      en: entry.en,
      cmds: entry.cmds,
      note: entry.note,
      cat: sec.name_es,
      catEn: sec.name_en,
      color: sec.color,
      si, ei
    });
  });
});

// ── BUILD BROWSE UI ──
function buildBrowse() {
  const area = document.getElementById('browseArea');
  const pills = document.getElementById('catPills');
  
  SECTIONS.forEach((sec, si) => {
    // Add pill
    const pill = document.createElement('button');
    pill.className = 'cat-pill';
    pill.dataset.cat = si;
    pill.innerHTML = `<span class="dot" style="background:${sec.color}"></span>${sec.name_es}`;
    pill.onclick = function() { filterCat(this, String(si)); };
    pills.appendChild(pill);
    
    // Add section block
    const block = document.createElement('div');
    block.className = 'section-block';
    block.dataset.si = si;
    block.innerHTML = `
      <button class="section-header-btn" onclick="toggleSection(this)">
        <span class="section-dot" style="background:${sec.color}"></span>
        <span class="section-name-es">${sec.name_es}</span>
        <span class="section-name-en" style="color:${sec.color};opacity:0.7;">${sec.name_en}</span>
        <span class="section-count">${sec.entries.length}</span>
        <span class="section-chevron">▼</span>
      </button>
      <div class="section-body">
        ${sec.entries.map((entry, ei) => `
          <div class="entry-row" onclick="openModal(${si}, ${ei})">
            <div class="entry-text">
              <div class="entry-es-text">${entry.es}</div>
              <div class="entry-cmds-wrap">
                ${entry.cmds.map(c => `<span class="entry-cmd-chip" onclick="copyCmd(event, '${c.replace(/'/g,"\'")}')">
                  ${c}
                </span>`).join('')}
              </div>
            </div>
          </div>`).join('')}
      </div>`;
    area.appendChild(block);
  });
}

// ── SECTION TOGGLE ──
function toggleSection(btn) {
  const block = btn.closest('.section-block');
  block.classList.toggle('open');
}

// ── FILTER BY CATEGORY ──
function filterCat(pillEl, cat) {
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  pillEl.classList.add('active');
  
  const blocks = document.querySelectorAll('.section-block');
  blocks.forEach(block => {
    if (cat === 'all') {
      block.classList.remove('hidden');
    } else {
      block.classList.toggle('hidden', block.dataset.si !== cat);
    }
  });
}

// ── REAL-TIME SEARCH ──
let searchTimer = null;
function onSearchInput(e) {
  const q = e.target.value.trim();
  const clearBtn = document.getElementById('clearSearchBtn');
  clearBtn.classList.toggle('visible', q.length > 0);
  
  clearTimeout(searchTimer);
  if (q.length === 0) {
    showBrowse();
    return;
  }
  searchTimer = setTimeout(() => doSearch(q), 80);
}

function doSearch(q) {
  const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
  const scored = [];
  
  searchIndex.forEach(item => {
    const cmdText = item.cmds.join(' ').toLowerCase();
    const fullText = [item.es, item.en, cmdText, item.cat].join(' ').toLowerCase();
    let score = 0;
    terms.forEach(term => {
      if (fullText.includes(term)) score += 1;
      if (cmdText.includes(term)) score += 4;
      if (item.es.toLowerCase().includes(term)) score += 2;
      item.cmds.forEach(cmd => {
        if (cmd.toLowerCase().startsWith(term)) score += 5;
        if (cmd.toLowerCase() === term) score += 10;
      });
    });
    if (score > 0) scored.push({ item, score });
  });
  
  scored.sort((a, b) => b.score - a.score);
  const results = scored.slice(0, 20).map(s => s.item);
  showResults(results, q);
}

function showResults(results, q) {
  document.getElementById('browseArea').classList.add('hidden');
  document.getElementById('catPills').style.display = 'none';
  const ra = document.getElementById('resultsArea');
  ra.classList.add('active');
  
  const header = document.getElementById('resultsHeader');
  header.innerHTML = results.length > 0
    ? `${results.length} resultado${results.length !== 1 ? 's' : ''} para <strong>"${q}"</strong>`
    : '';
  
  const list = document.getElementById('resultsList');
  if (results.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <span class="icon">🔍</span>
      <p>No hay resultados para <strong>"${q}"</strong>.<br>Prueba con otro término o el código directo.</p>
    </div>`;
    return;
  }
  
  list.innerHTML = results.map(item => {
    const idx = searchIndex.indexOf(item);
    const si = item.si;
    const ei = item.ei;
    return `<div class="result-card" style="--card-color:${item.color}" onclick="openModal(${si}, ${ei})">
      <div class="result-cat-badge" style="color:${item.color};background:${item.color}22;">${item.cat}</div>
      <div class="result-es">${item.es}</div>
      <div class="result-cmds">
        ${item.cmds.map(c => `<span class="cmd-chip" onclick="copyCmd(event, '${c.replace(/'/g,"\'")}')">
          ${c} <span class="copy-icon">⎘</span>
        </span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function showBrowse() {
  document.getElementById('resultsArea').classList.remove('active');
  document.getElementById('browseArea').classList.remove('hidden');
  document.getElementById('catPills').style.display = '';
  document.getElementById('resultsList').innerHTML = '';
  document.getElementById('resultsHeader').innerHTML = '';
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearSearchBtn').classList.remove('visible');
  showBrowse();
  document.getElementById('searchInput').focus();
}

// ── MODAL ──
function openModal(si, ei) {
  const sec = SECTIONS[si];
  const entry = sec.entries[ei];
  
  document.getElementById('modalCatBadge').innerHTML = `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${sec.color};margin-right:4px;"></span>${sec.name_es}`;
  document.getElementById('modalCatBadge').style.cssText = `color:${sec.color};background:${sec.color}20;`;
  document.getElementById('modalTitle').textContent = entry.es;
  
  const cmdsEl = document.getElementById('modalCmds');
  cmdsEl.innerHTML = entry.cmds.map(c => `
    <button class="modal-cmd-chip" onclick="copyCmd(event, '${c.replace(/'/g,"\'")}')">
      ${c}
      <span class="tap-hint">toca para copiar</span>
    </button>`).join('');
  
  const enWrap = document.getElementById('modalEnWrap');
  if (entry.en) {
    enWrap.style.display = '';
    document.getElementById('modalEn').innerHTML = `
      <div class="modal-en-label">Original EN</div>
      <div class="modal-en-text">${entry.en}</div>`;
  } else {
    enWrap.style.display = 'none';
  }
  
  // Related entries (same section)
  const relatedLabel = document.getElementById('modalRelatedLabel');
  const relatedEl = document.getElementById('modalRelated');
  const related = sec.entries
    .map((e, i) => ({ e, i }))
    .filter(({ i }) => i !== ei)
    .slice(0, 5);
  
  if (related.length > 0) {
    relatedLabel.innerHTML = `Más en <span style="color:${sec.color}">${sec.name_es}</span>`;
    relatedLabel.style.display = '';
    relatedEl.innerHTML = related.map(({ e, i }) => `
      <div class="related-card" onclick="openModal(${si}, ${i})">
        <span class="related-dot" style="background:${sec.color}"></span>
        <span class="related-es">${e.es}</span>
        <span class="related-cmd">${e.cmds[0]}</span>
      </div>`).join('');
  } else {
    relatedLabel.style.display = 'none';
    relatedEl.innerHTML = '';
  }
  
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ── COPY ──
function copyCmd(event, text) {
  event.stopPropagation();
  const clean = text.replace(/&nbsp;/g, ' ').replace(/&amp;/g, '&').trim();
  if (navigator.clipboard) {
    navigator.clipboard.writeText(clean).then(() => showToast(clean));
  } else {
    const ta = document.createElement('textarea');
    ta.value = clean;
    ta.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand('copy'); showToast(clean); } catch(e) {}
    document.body.removeChild(ta);
  }
}

function showToast(text) {
  const t = document.getElementById('copyToast');
  t.innerHTML = `✓ Copiado: <strong>${text}</strong>`;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ── KEYBOARD SHORTCUT ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === '/' && e.target.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

// ── SWIPE TO CLOSE MODAL ──
let touchStartY = 0;
document.getElementById('modalSheet').addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('modalSheet').addEventListener('touchmove', e => {
  const dy = e.touches[0].clientY - touchStartY;
  if (dy > 60) closeModal();
}, { passive: true });

// ── INIT ──
initTheme();
buildBrowse();
document.getElementById('searchInput').addEventListener('input', onSearchInput);
</script>
