*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);transition:background .3s,color .3s;}
.wrap{max-width:720px;margin:0 auto;padding:14px;}

/* HEADER */
.header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px 14px;margin-bottom:10px;box-shadow:var(--shadow);}

.brand-name{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.3px;}
.brand-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-top:1px;}
.brand-version{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--c-warn);background:var(--c-warn-bg);border:1px solid var(--c-warn-border);padding:2px 6px;border-radius:4px;margin-top:4px;display:inline-block;width:fit-content;}
.header-actions{display:flex;gap:6px;align-items:flex-start;}
.btn-icon{background:var(--surface3);border:1px solid var(--border);color:var(--text2);width:34px;height:34px;border-radius:var(--radius-sm);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}

.header-meta{display:flex;gap:12px;flex-wrap:wrap;padding-top:12px;margin-top:12px;border-top:1px solid var(--border);}
.meta-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.meta-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 2px rgba(34,197,94,.25);}

/* DAY TABS */
.day-tabs{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:5px;margin-bottom:10px;box-shadow:var(--shadow);overflow-x:auto;scrollbar-width:none;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex:0 0 auto;min-width:46px;border:none;border-radius:var(--radius-sm);background:transparent;color:var(--text2);font-size:10px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'JetBrains Mono',monospace;text-align:center;padding:7px 4px;white-space:nowrap;}
.day-tab .dt-num{font-size:15px;font-weight:800;display:block;line-height:1.1;}
.day-tab .dt-name{font-size:7px;display:block;margin-top:2px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
.day-tab.active{background:var(--accent2);color:white;}
.day-tab.active .dt-name{color:rgba(255,255,255,.7);}

/* STATS STRIP */
.stats-strip{display:flex;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 0;margin-bottom:10px;box-shadow:var(--shadow);}
.stat-item{flex:1;text-align:center;border-right:1px solid var(--border);padding:0 6px;}

.stat-num.s-rdo{color:var(--text3);}
.stat-num.s-curso{color:var(--c-curso);}
.stat-label{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

.section-head::after{content:'';flex:1;height:1px;background:var(--border);}

.acard-avatar.av-sup{background:var(--c-sup-bg);color:var(--c-sup);border-color:var(--c-sup-border);}
.acard-avatar.av-curso{background:var(--c-curso-bg);color:var(--c-curso);border-color:var(--c-curso-border);}
.acard-avatar.av-unassigned{background:var(--c-warn-bg);color:var(--c-warn);border-color:var(--c-warn-border);}

.acard-name{font-weight:700;font-size:14px;color:var(--text);display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.tag-sup{font-size:8px;font-weight:800;background:var(--c-sup);color:#fff;padding:2px 5px;border-radius:4px;letter-spacing:.5px;text-transform:uppercase;}
.tag-curso{font-size:8px;font-weight:800;background:var(--c-curso-bg);color:var(--c-curso);border:1px solid var(--c-curso-border);padding:2px 5px;border-radius:4px;letter-spacing:.5px;text-transform:uppercase;}
.tag-bags{font-size:8px;font-weight:800;background:var(--c-bags-bg);color:var(--c-bags);border:1px solid var(--c-bags-border);padding:2px 5px;border-radius:4px;letter-spacing:.5px;text-transform:uppercase;}
.tag-titular{font-size:8px;font-weight:800;background:var(--c-warn-bg);color:var(--c-warn);border:1px solid var(--c-warn-border);padding:2px 5px;border-radius:4px;letter-spacing:.5px;text-transform:uppercase;}
.tag-permuta{font-size:8px;font-weight:800;background:var(--c-kl686-bg);color:var(--c-kl686);border:1px solid var(--c-kl686-border);padding:2px 5px;border-radius:4px;letter-spacing:.5px;text-transform:uppercase;}
.acard-pos{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.acard-also{font-size:10px;color:var(--c-multi);font-family:'JetBrains Mono',monospace;font-weight:700;margin-top:3px;}
.acard-right{text-align:right;flex-shrink:0;}
.acard-break{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--c-warn);background:var(--c-warn-bg);border:1px solid var(--c-warn-border);padding:3px 7px;border-radius:6px;white-space:nowrap;}
.acard-rdo-tag{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--text3);background:var(--surface3);border:1px solid var(--border);padding:3px 7px;border-radius:6px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:1000;align-items:flex-end;justify-content:center;padding:0;}
.modal-overlay.open{display:flex;}
.modal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:720px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease;padding-bottom:env(safe-area-inset-bottom,20px);}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{position:sticky;top:0;z-index:10;background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:14px;}

.modal-name-block{flex:1;}

// ENGINE
// ═══════════════════════════════════════════════════════════════════════════
const POS_ICON = {
  recibe:"✈️", counter:"🖥️", dropoff:"🧳", priority:"⭐",
  kioskos:"📱", bags:"🎒", kl686:"🟢", af179:"🔵", af173:"🟣",
  sup:"🛡️", cover:"🔄", none:"⏸️", lobby:"🚪"
};
const STATUS_LABEL = {
  trabajo:"En Servicio", sup:"Supervisor", curso:"En Curso",
  unassigned:"Cobertura/Libre", permuta:"Permuta Trabajo"
};

const GROUP_ORDER = [
  {key:"Lobby",                         icon:"🚪",  label:"Lobby (Preparación de mostradores)"},
  {key:"Migracion/Recepcion de vuelos", icon:"✈️",  label:"Migracion/Recepcion de vuelos"},
  {key:"Mostrador Economy",             icon:"🖥️",  label:"Mostrador Economy"},
  {key:"Drop-Off 1",                    icon:"🧳",  label:"Drop-Off 1"},
  {key:"Drop-Off 2",                    icon:"🧳",  label:"Drop-Off 2"},
  {key:"Priority 1",                    icon:"⭐",  label:"Priority 1"},
  {key:"Priority 2",                    icon:"⭐",  label:"Priority 2"},
  {key:"Priority 3",                    icon:"⭐",  label:"Priority 3"},
  {key:"Apoyo Quioscos",                icon:"📱",  label:"Apoyo Quioscos"},
  {key:"Aduana/Equipaje (Todos Vuelos)",icon:"🎒",  label:"Aduana/Equipaje (Todos Vuelos)"},
  {key:"Abordaje AF179",                icon:"🔵",  label:"Abordaje AF179"},
  {key:"Abordaje KL686",                icon:"🟢",  label:"Abordaje KL686"},
  {key:"Abordaje AF173",                icon:"🟣",  label:"Abordaje AF173"},
  {key:"Sin asignación",                icon:"⏸️",  label:"Sin Asignación / Cobertura"},
  {key:"Supervisión",                   icon:"🛡️",  label:"Supervisión"},
];

let currentDay = 0;

function initials(name) {
  return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
}
function avatarClass(tipo) {
  if(tipo==="sup") return "av-sup";
  if(tipo==="curso") return "av-curso";
  if(tipo==="unassigned") return "av-unassigned";
  return "av-trabajo";
}
function cardBaseClass(tipo, isMulti) {
  if(isMulti) return "status-multi";
  if(tipo==="sup") return "status-sup";
  if(tipo==="curso") return "status-curso";
  if(tipo==="unassigned") return "status-unassigned";
  return "status-trabajo";
}

function renderDayTabs() {
  document.getElementById("dayTabs").innerHTML = DAYS.map((d,i)=>`
    <button class="day-tab${i===currentDay?" active":""}" onclick="switchDay(${i})">
      <span class="dt-num">${d.dayNum}</span>
      <span class="dt-name">${d.dayName}</span>
    </button>`).join('');
}

function renderStats(day) {
  const nCurso = day.agentes.filter(a=>a.tipo==="curso").length;
  const hasAlert = day.alertas && day.alertas.length > 0;
  document.getElementById("statsStrip").innerHTML = `
    <div class="stat-item"><div class="stat-num s-work">${day.enServicio}</div><div class="stat-label">Servicio</div></div>
    <div class="stat-item"><div class="stat-num s-rdo">${day.descanso}</div><div class="stat-label">RDO</div></div>
    ${nCurso>0?`<div class="stat-item"><div class="stat-num s-curso">${nCurso}</div><div class="stat-label">Curso</div></div>`:""}
    <div class="stat-item"><div class="stat-num" style="color:var(--accent2)">${day.total}</div><div class="stat-label">Plantilla</div></div>
    <div class="stat-item"><div class="stat-num" style="color:var(--c-af179);font-size:${day.vuelos.length>2?'10px':'14px'};line-height:1.3">${day.vuelos.join(" · ")}</div><div class="stat-label">Vuelos</div></div>
    ${hasAlert?`<div class="stat-item"><div class="stat-num" style="color:var(--c-warn);font-size:18px">⚠</div><div class="stat-label">Alerta</div></div>`:""}`;
}

function renderAgents(day) {
  const all = day.agentes;
  all.forEach((a,i)=>{ a._idx=i; });

  const grouped = {};
  all.forEach(a => {
    const gs = Array.isArray(a.grupos) ? a.grupos : [a.grupos || "Sin asignación"];
    a._grupos = gs;
    gs.forEach(g => {
      if(!grouped[g]) grouped[g]=[];
      grouped[g].push(a);
    });
  });

  let html = "";

  if(day.alertas && day.alertas.length>0) {
    html += `<div style="background:var(--c-warn-bg);border:1px solid var(--c-warn-border);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:10px;font-size:12px;color:var(--c-warn);font-family:'JetBrains Mono',monospace;font-weight:700;">
      ${day.alertas.map(a=>`⚠ ${a}`).join('<br>')}
    </div>`;
  }

  const order = GROUP_ORDER.map(g=>g.key);
  const allGroups = [...new Set(Object.keys(grouped))];
  const extra = allGroups.filter(g=>!order.includes(g));
  const finalOrder = [...order, ...extra];
  const rendered = new Set();

  finalOrder.forEach(gKey => {
    if(!grouped[gKey] || rendered.has(gKey)) return;
    rendered.add(gKey);
    const members = grouped[gKey];
    const meta = GROUP_ORDER.find(g=>g.key===gKey);
    html += `
      <div class="section-head">${meta?meta.icon:"📌"} ${meta?meta.label:gKey}
        <span style="font-size:10px;color:var(--accent2);font-family:'JetBrains Mono',monospace;margin-left:4px">${members.length} persona${members.length>1?"s":""}</span>
      </div>
      <div class="agent-grid">${members.map(a=>agentCard(a, a._idx, gKey)).join('')}</div>`;
  });
  return html;
}

function agentCard(a, idx, currentGroup) {
  const icon = POS_ICON[a.posType] || "❓";
  const gs = a._grupos || [];
  const isMulti = gs.length > 1 && !gs.every(g=>g==="Supervisión"||g==="Sin asignación");
  const otherGroups = gs.filter(g => g !== currentGroup && g !== "Supervisión" && g !== "Sin asignación");
  const hasCov = a.coberturas && a.coberturas.length > 0;
  const tags = a.tags || [];

  let displayPos = a.pos;
  let displayTime = a.posTime;
  if(a.allPositions) {
    const match = a.allPositions.find(p => p.pos === currentGroup);
    if(match) { displayPos = match.pos; displayTime = match.posTime; }
  }

  const tagHTML = tags.map(t=>{
    if(t.includes("BAGS")) return `<span class="tag-bags">BAGS</span>`;
    if(t.includes("TITULAR")) return `<span class="tag-titular">TITULAR</span>`;
    return '';
  }).join('');

  const alsoHTML = isMulti && otherGroups.length > 0
    ? `<div class="acard-also">→ también: ${otherGroups.join(' · ')}</div>` : "";

  return `<div class="acard ${cardBaseClass(a.tipo, isMulti)}" onclick="openModal(${idx})">
    <div class="acard-main">
      <div class="acard-avatar ${avatarClass(a.tipo)}">${initials(a.nombre)}</div>
      <div class="acard-info">
        <div class="acard-name">
          ${a.nombre}
          ${a.tipo==="sup"?'<span class="tag-sup">SUP</span>':""}
          ${a.tipo==="curso"?'<span class="tag-curso">CURSO</span>':""}
          ${a.tipo==="permuta"?'<span class="tag-permuta">PERMUTA</span>':""}
          ${tagHTML}
        </div>
        <div class="acard-pos">
          <span style="font-size:13px;margin-right:4px">${icon}</span>
          <strong style="color:var(--text)">${displayPos}</strong>
          ${displayTime?`<span style="color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:11px;margin-left:5px">${displayTime}</span>`:""}
          ${hasCov?`<span style="font-size:10px;color:var(--c-cover);margin-left:4px">· +${a.coberturas.length} cob.</span>`:""}
        </div>
        ${alsoHTML}
      </div>
      <div class="acard-right">
        ${a.alimentos&&a.alimentos!=="(break integrado)"?`<div class="acard-break">🍽️ ${a.alimentos}</div>`:""}
        ${a.alimentos==="(break integrado)"?`<div class="acard-rdo-tag">📚 en curso</div>`:""}
      </div>
    </div>
  </div>`;
}

function switchDay(idx) {
  currentDay = idx;
  renderDayTabs();
  const day = DAYS[idx];
  renderStats(day);
  day.agentes.forEach((a,i)=>{ a._idx=i; });
  document.getElementById("dayContent").innerHTML = renderAgents(day);
  window._currentDay = day;
}

// ── MODAL ──
function openModal(idx) {
  const day = window._currentDay;
  if(!day) return;
  const agent = day.agentes[idx];
  if(!agent) return;

  const avClass = avatarClass(agent.tipo);
  document.getElementById("mAvatar").className = `modal-avatar ${avClass}`;
  document.getElementById("mAvatar").textContent = initials(agent.nombre);
  document.getElementById("mName").textContent = agent.nombre;
  document.getElementById("mRole").textContent = `${STATUS_LABEL[agent.tipo]||"En Servicio"} · ${day.fecha}`;

  const gs = agent._grupos || [];
  const isMulti = gs.length > 1 && !gs.every(g=>g==="Supervisión"||g==="Sin asignación");
  const tags = agent.tags || [];
  let body = "";

  body += `<div class="modal-section"><div class="modal-section-title">📍 Posiciones del turno</div>`;
  if(agent.pos === "(sin asignación)") {
    body += `<div class="modal-pos-card" style="border-color:var(--c-warn-border);background:var(--c-warn-bg)">
      <div class="mpc-icon">⏸️</div>
      <div class="mpc-info"><div class="mpc-pos" style="color:var(--c-warn)">Sin posición asignada</div>
      <div class="mpc-note">Ver coberturas asignadas abajo</div></div></div>`;
  } else if(agent.allPositions && agent.allPositions.length > 1) {
    agent.allPositions.forEach(p => {
      const icon = POS_ICON[agent.posType] || "❓";
      body += `<div class="modal-pos-card">
        <div class="mpc-icon">${icon}</div>
        <div class="mpc-info">
          <div class="mpc-pos">${p.pos}</div>
          ${p.posTime?`<div class="mpc-time">🕐 ${p.posTime}</div>`:""}
          ${tags.includes("🎖 TITULAR")&&p.pos.startsWith("Abordaje")?`<div class="mpc-note">🎖 TITULAR en este vuelo</div>`:""}
          ${tags.includes("🎒 BAGS")&&p.pos.startsWith("Abordaje")?`<div class="mpc-note">🎒 Responsable BAGS/PENDIENTES</div>`:""}
        </div></div>`;
    });
    if(isMulti) body += `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--c-multi);padding:6px 0 0;font-weight:700;">⚠ ${agent.allPositions.length} posiciones en este turno — aparecés en todos los grupos correspondientes</div>`;
  } else {
    const icon = POS_ICON[agent.posType] || "❓";
    body += `<div class="modal-pos-card">
      <div class="mpc-icon">${icon}</div>
      <div class="mpc-info">
        <div class="mpc-pos">${agent.pos}</div>
        ${agent.posTime?`<div class="mpc-time">🕐 ${agent.posTime}</div>`:""}
        ${tags.includes("🎖 TITULAR")?`<div class="mpc-note">🎖 Eres el agente TITULAR de este abordaje</div>`:""}
        ${tags.includes("🎒 BAGS")?`<div class="mpc-note">🎒 Responsable de BAGS/PENDIENTES</div>`:""}
        ${agent.tipo==="curso"?`<div class="mpc-note">📚 En curso — break integrado</div>`:""}
      </div></div>`;
  }
  body += `</div>`;

  if(agent.alimentos && agent.alimentos !== "(break integrado)") {
    body += `<div class="modal-section"><div class="modal-section-title">🍽️ Alimentos</div>
      <div class="modal-break-card"><div class="mbc-icon">🍽️</div>
      <div><div class="mbc-label">Hora de comida / descanso</div>
      <div class="mbc-time">${agent.alimentos}</div></div></div></div>`;
  }

  if(agent.coberturas && agent.coberturas.length > 0) {
    body += `<div class="modal-section"><div class="modal-section-title">🔄 Coberturas asignadas</div>
      ${agent.coberturas.map(c=>`<div class="modal-cover-card">
        <div class="mpc-icon">🔄</div><div><div class="mcc-text">${c}</div></div></div>`).join('')}
      </div>`;
  }

  body += `<div class="modal-section"><div class="modal-section-title">📋 Resumen del turno</div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;font-size:13px;color:var(--text2);line-height:1.8">
      <b style="color:var(--text)">Turno:</b> 14:30 → 23:00<br>
      <b style="color:var(--text)">Estado:</b> ${STATUS_LABEL[agent.tipo]||"En Servicio"}<br>
      ${isMulti?`<b style="color:var(--text)">Posiciones:</b> ${(agent.allPositions||[]).map(p=>p.pos).join(' + ')}<br>`:`<b style="color:var(--text)">Posición:</b> ${agent.pos}<br>`}
      ${agent.posTime?`<b style="color:var(--text)">Horario:</b> ${agent.posTime}<br>`:""}
      ${agent.alimentos&&agent.alimentos!=="(break integrado)"?`<b style="color:var(--text)">Alimentos:</b> ${agent.alimentos}<br>`:""}
      ${agent.coberturas&&agent.coberturas.length?`<b style="color:var(--text)">Coberturas:</b> ${agent.coberturas.length} asignada(s)<br>`:""}
    </div></div>`;

  document.getElementById("mBody").innerHTML = body;
  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal(e) { if(e.target===document.getElementById("modalOverlay")) closeModalBtn(); }
function closeModalBtn() { document.getElementById("modalOverlay").classList.remove("open"); document.body.style.overflow=""; }

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute("data-theme")==="dark";
  html.setAttribute("data-theme", isDark?"light":"dark");
  document.getElementById("themeBtn").textContent = isDark?"🌙":"☀️";
  saveTheme(isDark?"light":"dark");
}
function saveTheme(t){ try{localStorage.setItem("stbc-theme",t);}catch(e){} }
function loadTheme(){ try{ const t=localStorage.getItem("stbc-theme"); if(t){ document.documentElement.setAttribute("data-theme",t); document.getElementById("themeBtn").textContent=t==="dark"?"☀️":"🌙"; }}catch(e){} }

// ── AUTO‑SELECT CURRENT DAY (Abril 2026) ──
function getTodayIndex() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1; // 0‑based
  const day = now.getDate();
  if (year !== 2026 || month !== 4) return 0; // solo abril 2026
  const dayStr = day.toString().padStart(2,'0');
  const idx = DAYS.findIndex(d => d.id === `04${dayStr}`);
  return idx >= 0 ? idx : 0;
}

// ── INIT ──
loadTheme();
renderDayTabs();
currentDay = getTodayIndex();
switchDay(currentDay);
</script>
</body>
</html>
